<html>
<head>
  <style>
    :root {
      --bg: #ffffff;
      --text: #333333;
    }
    body.dark {
      --bg: #1e1e2e;
      --text: #e0e0e0;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, sans-serif;
      padding: 2rem;
      transition: background 0.3s, color 0.3s;
    }
    #toggle {
      position: fixed;
      top: 1rem;
      right: 1rem;
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: var(--text);
      color: var(--bg);
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <h1>我的第一个 Git 项目</h1>
  <p>Hello Git!</p>
  第二次提交
  第三次提交
  <button id="toggle">切换深色模式</button>
  <p id="visit-count"></p>
  <script>
    const saved = localStorage.getItem('theme');
    if (saved === 'dark') document.body.classList.add('dark');

    document.getElementById('toggle').onclick = () => {
      document.body.classList.toggle('dark');
      localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
    };

    // 访问计数
    let count = parseInt(localStorage.getItem('visitCount') || '0') + 1;
    localStorage.setItem('visitCount', count);
    document.getElementById('visit-count').textContent = `这是你第 ${count} 次访问本页`;
  </script>
</body>
</html>
